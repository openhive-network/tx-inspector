<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loader</title>
  <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    .body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      overflow: hidden;
    }

    .logo {
      width: 100px;
      height: 100px;
      margin-left: 20px;
      margin-bottom: 20px;
    }

    .loader {
      width: fit-content;
      font-weight: bold;
      font-family: monospace;
      color: #fff;
      font-size: 30px;
      clip-path: inset(0 3ch 0 0);
      animation: l4 1s steps(4) infinite;
    }

    .loader:before {
      content:"Loading..."
    }

    @keyframes l4 {
      to {
        clip-path: inset(0 -1ch 0 0)
      }
    }
  </style>
</head>
<body class="body">
  <img src="/_nuxt/assets/images/hive-logo.webp" alt="Hive logo" class="logo">
  <div class="loader"></div>
</body>
</html>
